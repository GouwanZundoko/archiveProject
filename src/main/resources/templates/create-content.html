<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>コンテンツ作成</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
    background: #f8f9fa;
}

/* プレビュー全体 */
.preview-box {
    min-height: 700px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 24px;
}

/* mycontent-detail と同じ */
.thumbnail {
    width: 100%;
    aspect-ratio: 16 / 4.5;
    object-fit: cover;
    border-radius: 8px;
}

/* markdown表示 */
.description-box {
    white-space: normal;
    font-family: inherit;
    background: transparent;
    border: none;
    padding: 0;
    border-radius: 0;
    box-shadow: none;
}

.description-box h1,
.description-box h2,
.description-box h3 {
    margin-top: 1rem;
    margin-bottom: 1rem;
}

.description-box p {
    margin-bottom: 1rem;
}

.description-box pre {
    background: #f5f5f5;
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
}

.description-box code {
    background: #f1f1f1;
    padding: 2px 6px;
    border-radius: 4px;
}

/* 動画 */
.movie-box {
    width: 80%;
    margin-left: 0;
}

/* ダウンロード */
.download-box {
    width: 25%;
    min-width: 180px;
    margin-left: 0;
}
</style>
</head>
<body>

<!-- 戻るボタン -->
<button
    class="btn btn-outline-secondary back-button"
    onclick="history.back()">
    ←
</button>

<div class="container mt-4">

    <h2 th:text="${mode == 'edit'} ? 'コンテンツ編集' : '新規作成'"></h2>

    <form method="post"
          th:action="@{/contents/save}"
          enctype="multipart/form-data">

        <div class="row">

            <!-- 左：入力 -->
            <div class="col-md-6">

                <!-- タイトル -->
                <div class="mb-3">
                    <label class="form-label">タイトル *</label>
                    <input type="text"
                           name="title"
                           id="title"
                           class="form-control"
                           th:value="${content.contentsTitle}">
                </div>

                <!-- タグ -->
                <div class="mb-3">
                    <label class="form-label">タグ</label>
                    <input type="text"
                           name="tags"
                           id="tags"
                           class="form-control"
                           th:value="${content.tag}">
                </div>

                <!-- 説明 -->
                <div class="mb-3">
                    <label class="form-label">説明（Markdown）</label>
                    <textarea
                        name="description"
                        id="description"
                        class="form-control"
                        rows="10"
                        th:text="${content.contentsText}"></textarea>
                </div>

                <!-- サムネ -->
                <div class="mb-3">
                    <label class="form-label">サムネイル</label>

                    <input type="file"
                           id="thumbnailFile"
                           name="thumbnailFile"
                           class="form-control"
                           accept="image/*">

                    <input type="hidden"
                           id="imageUrl"
                           name="imageUrl"
                           th:value="${content.imageUrl}">
                </div>

                <!-- 動画 -->
                <div class="mb-3">
                    <label class="form-label">動画ファイル</label>

                    <input type="file"
                           id="videoFile"
                           name="videoFile"
                           class="form-control"
                           accept="video/*">

                    <input type="hidden"
                           id="movieUrl"
                           name="movieUrl"
                           th:value="${content.movieUrl}">
                </div>

                <!-- ファイル -->
                <div class="mb-3">
                    <label class="form-label">ファイル</label>

                    <input type="file"
                           id="documentFile"
                           name="documentFile"
                           class="form-control">

                    <input type="hidden"
                           id="fileUrl"
                           name="fileUrl"
                           th:value="${content.fileUrl}">
                </div>

                <button type="submit" class="btn btn-primary">
                    保存
                </button>

                <input type="hidden"
                       id="contentsId"
                       name="contentsId"
                       th:value="${contentsId}">
            </div>

            <!-- 右：プレビュー -->
            <div class="col-md-6">

                <label class="form-label fw-bold">プレビュー</label>

                <div class="preview-box">

                    <!-- サムネ -->
                    <div class="card mb-4" id="thumbnailCard" style="display:none;">
                        <img id="thumbnailPreview"
                             class="thumbnail"
                             alt="thumbnail">
                    </div>

                    <!-- タイトル -->
                    <div class="mb-4">
                        <h3 id="previewTitle"></h3>
                    </div>

                    <!-- タグ -->
                    <div class="mb-4">
                        <div id="previewTags"></div>
                    </div>

                    <!-- メタ -->
                    <div class="mb-3 text-muted">
                        テストユーザー / 1111/11/11
                    </div>

                    <hr>

                    <!-- 説明 -->
                    <div class="mb-4">
                        <div id="previewDescription"
                             class="description-box">
                        </div>
                    </div>

                    <!-- 動画 -->
                    <div id="videoBox"
                         class="card mb-4 movie-box"
                         style="display:none;">

                        <video id="videoPreview"
                               controls
                               class="w-100">
                        </video>
                    </div>

                    <!-- ダウンロード -->
                    <div id="downloadBox"
                         class="download-box mb-4"
                         style="display:none;">

                        <button
                            type="button"
                            class="btn btn-primary w-100">
                            ダウンロード
                        </button>
                    </div>

                </div>
            </div>

        </div>
    </form>
</div>

<script>
const titleInput = document.getElementById("title");
const tagsInput = document.getElementById("tags");
const descriptionInput = document.getElementById("description");

const thumbnailFile = document.getElementById("thumbnailFile");
const imageUrl = document.getElementById("imageUrl");
const thumbnailPreview = document.getElementById("thumbnailPreview");
const thumbnailCard = document.getElementById("thumbnailCard");

const videoFile = document.getElementById("videoFile");
const movieUrl = document.getElementById("movieUrl");
const videoPreview = document.getElementById("videoPreview");
const videoBox = document.getElementById("videoBox");

const documentFile = document.getElementById("documentFile");
const fileUrl = document.getElementById("fileUrl");
const downloadBox = document.getElementById("downloadBox");

const previewTitle = document.getElementById("previewTitle");
const previewTags = document.getElementById("previewTags");
const previewDescription = document.getElementById("previewDescription");

/* 初期表示も含めて全部ここで制御 */
function initializePreview() {
    renderTitle();
    renderTags();
    renderDescription();
    renderThumbnail();
    renderVideo();
    renderDownloadButton();
}

function renderTitle() {
    previewTitle.textContent =
        titleInput.value || "タイトル未入力";
}

function renderTags() {
    const raw = tagsInput.value || "";
    previewTags.innerHTML = "";

    if (!raw.trim()) return;

    raw.split(",").forEach(tag => {
        const span = document.createElement("span");
        span.className = "badge bg-secondary me-1";
        span.textContent = tag.trim();
        previewTags.appendChild(span);
    });
}

function renderDescription() {
    previewDescription.innerHTML =
        marked.parse(descriptionInput.value || "");
}

function renderThumbnail() {
    const file = thumbnailFile.files[0];

    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            thumbnailPreview.src = e.target.result;
            thumbnailCard.style.display = "block";
        };
        reader.readAsDataURL(file);
        return;
    }

    if (imageUrl.value && imageUrl.value.trim() !== "") {
        thumbnailPreview.src = imageUrl.value;
        thumbnailCard.style.display = "block";
        return;
    }

    thumbnailCard.style.display = "none";
}

function renderVideo() {
    const file = videoFile.files[0];

    if (file) {
        videoPreview.src = URL.createObjectURL(file);
        videoBox.style.display = "block";
        return;
    }

    if (movieUrl.value && movieUrl.value.trim() !== "") {
        videoPreview.src = movieUrl.value;
        videoBox.style.display = "block";
        return;
    }

    videoBox.style.display = "none";
}

function renderDownloadButton() {
    const hasNewFile = documentFile.files.length > 0;
    const hasOldFile =
        fileUrl.value && fileUrl.value.trim() !== "";

    if (hasNewFile || hasOldFile) {
        downloadBox.style.display = "block";
    } else {
        downloadBox.style.display = "none";
    }
}

/* イベント */
titleInput.addEventListener("input", renderTitle);
tagsInput.addEventListener("input", renderTags);
descriptionInput.addEventListener("input", renderDescription);

thumbnailFile.addEventListener("change", renderThumbnail);
videoFile.addEventListener("change", renderVideo);
documentFile.addEventListener("change", renderDownloadButton);

/* 初回表示 */
document.addEventListener("DOMContentLoaded", function () {
    initializePreview();
});
</script>

</body>
</html>
