<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>コンテンツ作成</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
    .preview-box {
        min-height: 500px;
        background: #fafafa;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 20px;
    }

    .thumbnail-preview {
        max-width: 100%;
        max-height: 250px;
        object-fit: contain;
        border: 1px solid #ddd;
        border-radius: 8px;
        margin-bottom: 15px;
    }

    .video-preview {
        width: 100%;
        max-height: 300px;
        border-radius: 8px;
        margin-bottom: 15px;
    }
</style>

</head>
<body>

<div class="container mt-4">

    <h2 th:text="${mode == 'edit'} ? 'コンテンツ編集' : '新規作成'"></h2>

    <form method="post"
          th:action="@{/contents/save}"
          enctype="multipart/form-data">

        <div class="row">

            <!-- 左側：入力フォーム -->
            <div class="col-md-6">

                <!-- タイトル -->
                <div class="mb-3">
                    <label class="form-label">タイトル *</label>
                    <input type="text"
                           name="title"
                           id="title"
                           class="form-control"
                           th:value="${content.contentsTitle}">
                </div>

                <!-- タグ -->
                <div class="mb-3">
                    <label class="form-label">タグ</label>
                    <input type="text"
                           name="tags"
                           id="tags"
                           class="form-control"
                           th:value="${content.tag}">
                </div>

                <!-- 説明 -->
                <div class="mb-3">
                    <label class="form-label">説明（Markdown）</label>
                    <textarea name="description"
                              id="description"
                              class="form-control"
                              rows="10"
                              th:text="${content.contentsText}"></textarea>
                </div>

                <!-- サムネ -->
                <div class="mb-3">
                    <label class="form-label">サムネイル</label>
                    <input type="file"
                           id="thumbnailFile"
                           name="thumbnailFile"
                           class="form-control"
                           accept="image/*">

                    <input type="hidden"
                           id="imageUrl"
                           name="imageUrl"
                           th:value="${content.imageUrl}">
                </div>

                <!-- 動画 -->
                <div class="mb-3" id="videoArea">
                    <label class="form-label">動画ファイル</label>
                    <input type="file"
                           id="videoFile"
                           name="videoFile"
                           class="form-control"
                           accept="video/*">

                    <input type="hidden"
                           id="movieUrl"
                           name="movieUrl"
                           th:value="${content.movieUrl}">
                </div>

                <!-- ファイル -->
                <div class="mb-3" id="fileArea">
                    <label class="form-label">ファイル</label>
                    <input type="file"
                           id="documentFile"
                           name="documentFile"
                           class="form-control">

                    <input type="hidden"
                           id="fileUrl"
                           name="fileUrl"
                           th:value="${content.fileUrl}">
                </div>

                <button type="submit" class="btn btn-primary">
                    保存
                </button>

                <input type="hidden"
                       id="contentsId"
                       name="contentsId"
                       th:value="${contentsId}" />

            </div>

            <!-- 右側：プレビュー -->
            <div class="col-md-6">

                <label class="form-label fw-bold">プレビュー</label>

                <div class="preview-box" style="min-height: 100%;">

                    <!-- タイトル -->
                    <h2 id="previewTitle" class="mb-3"></h2>

                    <!-- タグ -->
                    <div id="previewTags" class="mb-3 text-muted"></div>

                    <!-- サムネイル -->
                    <img id="thumbnailPreview"
                        class="thumbnail-preview"
                        style="display:none;">

                    <!-- 動画 -->
                    <video id="videoPreview"
                        class="video-preview"
                        controls
                        style="display:none;">
                    </video>

                    <!-- Markdown本文 -->
                    <div id="preview"></div>

                </div>

            </div>

        </div>
    </form>
</div>
<style>
.preview-box {
    min-height: 700px; /* 保存ボタン付近まで確保 */
    background: #fafafa;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 20px;
}
</style>
<script>
    const textarea = document.getElementById("description");
    const preview = document.getElementById("preview");

    const thumbnailFile = document.getElementById("thumbnailFile");
    const thumbnailPreview = document.getElementById("thumbnailPreview");
    const imageUrl = document.getElementById("imageUrl");

    const videoFile = document.getElementById("videoFile");
    const videoPreview = document.getElementById("videoPreview");
    const movieUrl = document.getElementById("movieUrl");

    function renderMarkdown() {
        preview.innerHTML = marked.parse(textarea.value || "");
    }

    function previewImage() {
        const file = thumbnailFile.files[0];

        if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                thumbnailPreview.src = e.target.result;
                thumbnailPreview.style.display = "block";
            };
            reader.readAsDataURL(file);
        }
    }

    const titleInput = document.getElementById("title");
    const tagsInput = document.getElementById("tags");

    const previewTitle = document.getElementById("previewTitle");
    const previewTags = document.getElementById("previewTags");

    function renderMarkdown() {
        preview.innerHTML = marked.parse(textarea.value || "");
    }

    function renderTitleAndTags() {
        previewTitle.textContent = titleInput.value || "タイトル未入力";

        const tags = tagsInput.value || "";
        previewTags.textContent = tags ? "タグ： " + tags : "";
    }

    function previewImage() {
        const file = thumbnailFile.files[0];

        if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                thumbnailPreview.src = e.target.result;
                thumbnailPreview.style.display = "block";
            };
            reader.readAsDataURL(file);
        } else if (imageUrl.value && imageUrl.value.trim() !== "") {
            thumbnailPreview.src = imageUrl.value;
            thumbnailPreview.style.display = "block";
        }
    }

    function previewVideo() {
        const file = videoFile.files[0];

        if (file) {
            const url = URL.createObjectURL(file);
            videoPreview.src = url;
            videoPreview.style.display = "block";
        } else if (movieUrl.value && movieUrl.value.trim() !== "") {
            videoPreview.src = movieUrl.value;
            videoPreview.style.display = "block";
        }
    }
    // 初期表示用（既存データがある場合）
    function loadExistingMedia() {
        // サムネイル画像
        if (imageUrl.value && imageUrl.value.trim() !== "") {
            thumbnailPreview.src = imageUrl.value;
            thumbnailPreview.style.display = "block";
        }

        // 動画
        if (movieUrl.value && movieUrl.value.trim() !== "") {
            videoPreview.src = movieUrl.value;
            videoPreview.style.display = "block";
        }
    }
    
    textarea.addEventListener("input", renderMarkdown);
    titleInput.addEventListener("input", renderTitleAndTags);
    tagsInput.addEventListener("input", renderTitleAndTags);
    thumbnailFile.addEventListener("change", previewImage);
    videoFile.addEventListener("change", previewVideo);

    renderMarkdown();
    renderTitleAndTags();
    loadExistingMedia();
</script>

</body>
</html>
