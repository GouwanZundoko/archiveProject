<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>コンテンツ作成</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>
<body>

<div class="container mt-4">

    <h2 th:text="${mode == 'edit'} ? 'コンテンツ編集' : '新規作成'"></h2>

    <form method="post" th:action="@{/contents/save}" enctype="multipart/form-data">

        <!-- タイトル -->
        <div class="mb-3">
            <label class="form-label">タイトル *</label>
            <input type="text" name="title" id="title" class="form-control" th:value="${content.contentsTitle}">
        </div>

        <!-- タグ -->
        <div class="mb-3">
            <label class="form-label">タグ</label>
            <input type="text" name="tags" id="tags" class="form-control" th:value="${content.tag}">
        </div>

        <!-- 説明 -->
        <div class="mb-3">
            <label class="form-label">説明（Markdown）</label>
            <textarea name="description" id="description" class="form-control" rows="8"
                      th:text="${content.contentsText}"></textarea>
        </div>

        <!-- サムネ -->
        <div class="mb-3">
            <label class="form-label">サムネイル</label>
            <input type="file" id="thumbnailFile" name="thumbnailFile" class="form-control">
            <input type="hidden" id = "imageUrl" name="imageUrl" th:value="${content.imageUrl}">
        </div>

        <!-- 動画 -->
        <div class="mb-3" id="videoArea">
            <label class="form-label">動画ファイル</label>
            <input type="file" id="videoFile" name="videoFile" class="form-control">
            <input type="hidden" id = "movieUrl" name="movieUrl" th:value="${content.movieUrl}">
        </div>

        <!-- ファイル -->
        <div class="mb-3" id="fileArea">
            <label class="form-label">ファイル</label>
            <input type="file" id="documentFile" name="documentFile" class="form-control">
            <input type="hidden" id = "fileUrl" name="fileUrl" th:value="${content.fileUrl}">
        </div>

        <!-- プレビュー -->
        <div class="mb-3">
            <label class="form-label">プレビュー</label>
            <div id="preview" class="border p-3"></div>
        </div>

        <button type="submit" class="btn btn-primary">保存</button>
        
        <input type="hidden" id="contentsId"  name="contentsId" th:value="${contentsId}" />

    </form>
</div>

<script>
    const textarea = document.getElementById("description");
    const preview = document.getElementById("preview");

    function renderMarkdown() {
        preview.innerHTML = marked.parse(textarea.value);
    }

    textarea.addEventListener("input", renderMarkdown);
    renderMarkdown();

    const typeSelect = document.getElementById("typeSelect");
    const videoArea = document.getElementById("videoArea");
    const fileArea = document.getElementById("fileArea");

    function toggleInput() {
        const type = typeSelect.value;
        videoArea.style.display = type === "video" ? "block" : "none";
        fileArea.style.display = (type === "document" || type === "markup") ? "block" : "none";
    }

    typeSelect.addEventListener("change", toggleInput);
    toggleInput();
</script>

</body>
</html>
