<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>コンテンツ作成</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
    background: #f8f9fa;
}

/* プレビュー全体 */
.preview-box {
    min-height: 700px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 24px;
}

/* サムネプレビュー */
.thumbnail {
    width: 100%;
    height: 195px;
    object-fit: cover;
    object-position: left center;
    border-radius: 8px;
}

/* markdown表示 */
.description-box {
    white-space: normal;
    font-family: inherit;
    background: transparent;
    border: none;
    padding: 0;
    border-radius: 0;
    box-shadow: none;
}

.description-box h1,
.description-box h2,
.description-box h3 {
    margin-top: 1rem;
    margin-bottom: 1rem;
}

.description-box p {
    margin-bottom: 1rem;
}

.description-box pre {
    background: #f5f5f5;
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
}

.description-box code {
    background: #f1f1f1;
    padding: 2px 6px;
    border-radius: 4px;
}

/* 動画 */
.movie-box {
    width: 80%;
    margin-left: 0;
}

/* ダウンロード */
.download-box {
    width: 25%;
    min-width: 180px;
    margin-left: 0;
}

/* 切り抜き */
.crop-wrapper {
    position: relative;
    width: 100%;
    max-width: 700px;
    min-height: auto;
    overflow: hidden;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fafafa;
    margin-top: 12px;
}

#cropImage {
    position: absolute;
    top: 0;
    left: 0;
    max-width: none;
    user-select: none;
    -webkit-user-drag: none;
}

#cropBox {
    position: absolute;
    width: 694px;
    height: 195px;
    border: 2px solid #0d6efd;
    background: rgba(13,110,253,0.08);
    cursor: move;
    box-sizing: border-box;
}

.resize-handle {
    position: absolute;
    right: -8px;
    bottom: -8px;
    width: 18px;
    height: 18px;
    background: #0d6efd;
    border-radius: 50%;
    cursor: nwse-resize;
}
</style>
</head>
<body>

<button
    class="btn btn-outline-secondary m-3"
    onclick="history.back()">
    ←
</button>

<div class="container mt-4">

    <h2 th:text="${mode == 'edit'} ? 'コンテンツ編集' : '新規作成'"></h2>

    <form method="post"
          th:action="@{/contents/save}"
          enctype="multipart/form-data">

        <div class="row">

            <!-- 左：入力 -->
            <div class="col-md-6">

                <!-- タイトル -->
                <div class="mb-3">
                    <label class="form-label">タイトル *</label>
                    <input type="text"
                           name="title"
                           id="title"
                           class="form-control"
                           th:value="${content.contentsTitle}">
                </div>

                <!-- タグ -->
                <div class="mb-3">
                    <label class="form-label">タグ</label>
                    <input type="text"
                           name="tags"
                           id="tags"
                           class="form-control"
                           th:value="${content.tag}">
                </div>

                <!-- 説明 -->
                <div class="mb-3">
                    <label class="form-label">説明（Markdown）</label>
                    <textarea
                        name="description"
                        id="description"
                        class="form-control"
                        rows="10"
                        th:text="${content.contentsText}"></textarea>
                </div>

                <!-- サムネ -->
                <div class="mb-3">
                    <label class="form-label">サムネイル</label>

                    <!-- ★ file input は upload専用 -->
                    <input type="file"
                        id="thumbnailUpload"
                        class="form-control"
                        accept="image/*">

                    <!-- ★ 保存用（Base64） -->
                    <input type="hidden"
                        id="thumbnailFile"
                        name="thumbnailFile">

                    <input type="hidden"
                        id="imageUrl"
                        name="imageUrl"
                        th:value="${content.imageUrl}">

                    <!-- 切り抜きエリア -->
                    <div id="cropArea" style="display:none;">
                        <div class="crop-wrapper">
                            <img id="cropImage" alt="crop target">

                            <div id="cropBox">
                                <div class="resize-handle"></div>
                            </div>
                        </div>

                        <canvas id="cropCanvas"
                                width="694"
                                height="195"
                                style="display:none;"></canvas>
                    </div>
                </div>

                <!-- 動画 -->
                <div class="mb-3">
                    <label class="form-label">動画ファイル</label>

                    <input type="file"
                           id="videoFile"
                           name="videoFile"
                           class="form-control"
                           accept="video/*">

                    <input type="hidden"
                           id="movieUrl"
                           name="movieUrl"
                           th:value="${content.movieUrl}">
                </div>

                <!-- ファイル -->
                <div class="mb-3">
                    <label class="form-label">ファイル</label>

                    <input type="file"
                           id="documentFile"
                           name="documentFile"
                           class="form-control">

                    <input type="hidden"
                           id="fileUrl"
                           name="fileUrl"
                           th:value="${content.fileUrl}">
                </div>

                <button type="submit" class="btn btn-primary">
                    保存
                </button>

                <input type="hidden"
                       id="contentsId"
                       name="contentsId"
                       th:value="${contentsId}">
            </div>

            <!-- 右：プレビュー -->
            <div class="col-md-6">

                <label class="form-label fw-bold">プレビュー</label>

                <div class="preview-box">

                    <!-- サムネ -->
                    <div class="card mb-4"
                         id="thumbnailCard"
                         style="display:none;">
                        <img id="thumbnailPreview"
                             class="thumbnail"
                             alt="thumbnail">
                    </div>

                    <!-- タイトル -->
                    <div class="mb-4">
                        <h3 id="previewTitle"></h3>
                    </div>

                    <!-- タグ -->
                    <div class="mb-4">
                        <div id="previewTags"></div>
                    </div>

                    <!-- メタ -->
                    <div class="mb-3 text-muted">
                        テストユーザー / 1111/11/11
                    </div>

                    <hr>

                    <!-- 説明 -->
                    <div class="mb-4">
                        <div id="previewDescription"
                             class="description-box"></div>
                    </div>

                    <!-- 動画 -->
                    <div id="videoBox"
                         class="card mb-4 movie-box"
                         style="display:none;">
                        <video id="videoPreview"
                               controls
                               class="w-100"></video>
                    </div>

                    <!-- ダウンロード -->
                    <div id="downloadBox"
                         class="download-box mb-4"
                         style="display:none;">
                        <button
                            type="button"
                            class="btn btn-primary w-100">
                            ダウンロード
                        </button>
                    </div>

                </div>
            </div>

        </div>
    </form>
</div>

<script>
const titleInput = document.getElementById("title");
const tagsInput = document.getElementById("tags");
const descriptionInput = document.getElementById("description");

/*
★ 修正
thumbnailUpload = 選択用
thumbnailFile   = 保存用 hidden
*/
const thumbnailUpload = document.getElementById("thumbnailUpload");
const thumbnailFile = document.getElementById("thumbnailFile");

const imageUrl = document.getElementById("imageUrl");
const thumbnailPreview = document.getElementById("thumbnailPreview");
const thumbnailCard = document.getElementById("thumbnailCard");

const cropArea = document.getElementById("cropArea");
const cropImage = document.getElementById("cropImage");
const cropBox = document.getElementById("cropBox");
const cropCanvas = document.getElementById("cropCanvas");
const resizeHandle = document.querySelector(".resize-handle");

const videoFile = document.getElementById("videoFile");
const movieUrl = document.getElementById("movieUrl");
const videoPreview = document.getElementById("videoPreview");
const videoBox = document.getElementById("videoBox");

const documentFile = document.getElementById("documentFile");
const fileUrl = document.getElementById("fileUrl");
const downloadBox = document.getElementById("downloadBox");

const previewTitle = document.getElementById("previewTitle");
const previewTags = document.getElementById("previewTags");
const previewDescription = document.getElementById("previewDescription");

let scale = 1;

let crop = {
    x: 0,
    y: 100,
    width: 694,
    height: 195
};

let isDraggingCrop = false;
let isResizing = false;
let startX = 0;
let startY = 0;

/* 初期表示 */
function initializePreview() {
    renderTitle();
    renderTags();
    renderDescription();
    renderThumbnail();
    renderVideo();
    renderDownloadButton();
}

function renderTitle() {
    previewTitle.textContent =
        titleInput.value || "タイトル未入力";
}

function renderTags() {
    const raw = tagsInput.value || "";
    previewTags.innerHTML = "";

    if (!raw.trim()) return;

    raw.split(",").forEach(tag => {
        const span = document.createElement("span");
        span.className = "badge bg-secondary me-1";
        span.textContent = tag.trim();
        previewTags.appendChild(span);
    });
}

function renderDescription() {
    previewDescription.innerHTML =
        marked.parse(descriptionInput.value || "");
}

function renderThumbnail() {
    /*
    ★ 修正
    thumbnailUpload を使用
    */
    const file = thumbnailUpload.files[0];

    if (file) {
        const reader = new FileReader();

        reader.onload = function(e) {
            cropImage.onload = function () {
                setupCrop();
            };

            cropImage.src = e.target.result;
            cropArea.style.display = "block";
        };

        reader.readAsDataURL(file);
        return;
    }

    if (imageUrl.value && imageUrl.value.trim() !== "") {
        thumbnailPreview.src = imageUrl.value;
        thumbnailCard.style.display = "block";
        return;
    }

    thumbnailCard.style.display = "none";
}

function setupCrop() {
    const wrapper = document.querySelector(".crop-wrapper");

    const wrapperWidth = wrapper.clientWidth;
    const img = cropImage;

    const scaleX = wrapperWidth / img.naturalWidth;
    const minScaleForCrop = 694 / img.naturalWidth;

    /*
    cropBox幅(694px)より画像幅が小さくならないようにする
    */
    scale = Math.max(scaleX, minScaleForCrop);

    const displayWidth = img.naturalWidth * scale;
    const displayHeight = img.naturalHeight * scale;

    wrapper.style.height = displayHeight + "px";
    img.style.width = displayWidth + "px";
    img.style.height = displayHeight + "px";
    img.style.left = "0px";
    img.style.top = "0px";

    crop.x = 0;
    crop.y = 100;
    crop.width = 694;
    crop.height = 195;

    updateCropBox();
}

function updateCropBox() {
    const maxX = cropImage.offsetWidth - crop.width;
    const maxY = cropImage.offsetHeight - crop.height;

    crop.x = Math.max(0, Math.min(crop.x, maxX));
    crop.y = Math.max(0, Math.min(crop.y, maxY));

    cropBox.style.left = crop.x + "px";
    cropBox.style.top = crop.y + "px";
    cropBox.style.width = crop.width + "px";
    cropBox.style.height = crop.height + "px";

    updatePreviewThumbnail();
}

function updatePreviewThumbnail() {
    const ctx = cropCanvas.getContext("2d");

    const sx = crop.x / scale;
    const sy = crop.y / scale;
    const sw = crop.width / scale;
    const sh = crop.height / scale;

    ctx.clearRect(0, 0, 694, 195);

    ctx.drawImage(
        cropImage,
        sx,
        sy,
        sw,
        sh,
        0,
        0,
        694,
        195
    );

    /*
    ★ Base64取得
    */
    const croppedBase64 =
        cropCanvas.toDataURL("image/png");

    /*
    ★ preview表示
    */
    thumbnailPreview.src = croppedBase64;
    thumbnailCard.style.display = "block";

    /*
    ★ hiddenへ保存
    */
    thumbnailFile.value = croppedBase64;
}

function renderVideo() {
    const file = videoFile.files[0];

    if (file) {
        videoPreview.src = URL.createObjectURL(file);
        videoBox.style.display = "block";
        return;
    }

    if (movieUrl.value && movieUrl.value.trim() !== "") {
        videoPreview.src = movieUrl.value;
        videoBox.style.display = "block";
        return;
    }

    videoBox.style.display = "none";
}

function renderDownloadButton() {
    const hasNewFile = documentFile.files.length > 0;
    const hasOldFile =
        fileUrl.value && fileUrl.value.trim() !== "";

    downloadBox.style.display =
        (hasNewFile || hasOldFile) ? "block" : "none";
}

/* crop drag */
cropBox.addEventListener("mousedown", function(e) {
    if (e.target === resizeHandle) return;

    isDraggingCrop = true;
    startX = e.clientX - crop.x;
    startY = e.clientY - crop.y;
});

resizeHandle.addEventListener("mousedown", function(e) {
    e.stopPropagation();
    isResizing = true;
    startX = e.clientX;
});

document.addEventListener("mousemove", function(e) {
    if (isDraggingCrop) {
        crop.x = e.clientX - startX;
        crop.y = e.clientY - startY;
        updateCropBox();
    }

    if (isResizing) {
        const dx = e.clientX - startX;

        let newWidth = crop.width + dx;
        newWidth = Math.max(300, newWidth);

        let newHeight = (newWidth / 694) * 195;

        crop.width = newWidth;
        crop.height = newHeight;

        startX = e.clientX;

        updateCropBox();
    }
});

document.addEventListener("mouseup", function() {
    isDraggingCrop = false;
    isResizing = false;
});

/* イベント */
titleInput.addEventListener("input", renderTitle);
tagsInput.addEventListener("input", renderTags);
descriptionInput.addEventListener("input", renderDescription);

/*
★ 修正
thumbnailUpload を監視
*/
thumbnailUpload.addEventListener("change", renderThumbnail);

videoFile.addEventListener("change", renderVideo);
documentFile.addEventListener("change", renderDownloadButton);

/* 初回 */
document.addEventListener("DOMContentLoaded", function () {
    initializePreview();
});
</script>

</body>
</html>
