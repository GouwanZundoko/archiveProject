<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>マイリスト</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link th:href="@{/css/list.css}" rel="stylesheet">
</head>

<body>

<body>

<!-- ヘッダー -->
<div th:replace="fragments/header :: header('myLists')"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>マイリスト一覧</h2>
        <button class="btn btn-primary" onclick="openCreateListModal()">
            ＋ リスト作成
        </button>
    </div>

    <div class="row">
        <div class="col-md-4 mb-3" th:each="list : ${lists}">
            <div class="card">
                <div class="card-body">
                    <h5 th:text="${list.listsTitle}"></h5>
                    <p th:text="${list.listsText != null ? list.listsText : '内容なし'}"></p>

                    <!-- タグ -->
                    <div class="mb-4">
                        <span
                            class="badge bg-secondary me-1"
                            th:each="tag : ${list.listsTagArray}"
                            th:text="${tag}">
                        </span>
                    </div>

                    <div th:if="${list.showAuth == '1'}">
                        <button class="btn btn-success w-100 mt-2"
                                th:attr="data-list-id=${list.listsId}"
                                onclick="openModal(this)">
                            コンテンツ追加
                        </button>
                    </div>

                    <button class="btn btn-info w-100 mt-2"
                            th:attr="data-list-id=${list.listsId}"
                            onclick="openViewModal(this)">
                        コンテンツ閲覧
                    </button>

                    <!-- コンテンツ公開 -->
                    <a th:if="${list.showAuth == '1' && list.showPublicAuth == '0'}"
                       th:href="@{'/my-lists/release/' + ${list.listsId} + '/1'}"
                       class="btn btn-primary btn-sm">
                        コンテンツ公開
                    </a>

                    <!-- コンテンツ非公開 -->
                    <a th:if="${list.showAuth == '1' && list.showPublicAuth == '1'}"
                       th:href="@{'/my-lists/release/' + ${list.listsId} + '/0'}"
                       class="btn btn-primary btn-sm">
                        コンテンツ非公開
                    </a>

                    <!-- 削除 -->
                    <a th:href="@{'/my-lists/delete/' + ${list.listsId}}"
                       class="btn btn-warning btn-sm">
                        削除
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ================= リスト作成モーダル ================= -->
<div id="createListModal" class="custom-modal">

    <div class="modal-box create-list-modal-box">

        <div class="modal-close-area">
            <button onclick="closeCreateListModal()">×</button>
        </div>

        <h4>リスト作成</h4>

        <form action="/my-lists/create-list" method="post">
            <input type="hidden" id="hiddenListId" name="hiddenListId">

            <!-- タイトル -->
            <div class="mb-3">
                <label class="form-label">タイトル</label>
                <input type="text"
                       name="listsTitle"
                       class="form-control"
                       required>
            </div>

            <!-- 説明 -->
            <div class="mb-3">
                <label class="form-label">説明</label>
                <textarea name="listsText"
                          class="form-control"></textarea>
            </div>

            <!-- タグ -->
            <div class="mb-3">
                <label class="form-label">タグ</label>
                <textarea name="listsTag"
                          class="form-control"></textarea>
            </div>

            <div class="modal-center">
                <button type="submit" class="btn btn-success">
                    作成
                </button>
                <button type="button"
                        class="btn btn-secondary"
                        onclick="closeCreateListModal()">
                    キャンセル
                </button>
            </div>

        </form>
    </div>
</div>

<!-- ================= コンテンツ追加モーダル ================= -->
<div id="modal" class="custom-modal">

    <div class="modal-box large-modal-box">

        <div class="modal-close-area">
            <button onclick="closeModal()">×</button>
        </div>

        <div class="modal-main-layout">

            <!-- 左：コンテンツ一覧 -->
            <div class="content-list-section">
                <h5 class="mb-3">コンテンツ一覧</h5>

                <div class="content-list-scroll">
                    <div id="contentListArea" class="short-list-area">

                        <div th:each="item : ${contentsList}"
                             class="short-row-card"
                             th:attr="data-contents-id=${item.contentsId},
                                      data-tag=${item.tag},
                                      data-user-id=${item.userId},
                                      data-title=${item.contentsTitle},
                                      data-text=${item.contentsText},
                                      data-image=${item.imageUrl}">

                            <div class="short-image-area">
                                <img class="short-thumbnail"
                                     th:src="@{${item.imageUrl}}">
                            </div>

                            <div class="short-info-area">

                                <div class="short-title"
                                     th:text="${item.contentsTitle}">
                                </div>

                                <div class="short-tag-area">
                                    <span class="short-tag"
                                          th:each="tag : ${item.contentsTagArray}"
                                          th:text="${tag}">
                                    </span>
                                </div>

                                <p class="short-description"
                                   th:text="${item.contentsText}">
                                </p>

                            </div>

                            <button class="btn btn-primary btn-sm add-btn short-action-button"
                                    onclick="addItem(this)">
                                追加
                            </button>

                        </div>

                    </div>
                </div>
            </div>

            <!-- 右：選択済み -->
            <div class="selected-content-section">
                <h5 class="mb-2">
                    選択済みコンテンツ
                    <span id="selectedCount"
                          class="badge bg-secondary">0</span>
                </h5>

                <div class="selected-content-scroll">
                    <div id="selectedArea" class="short-list-area"></div>
                </div>
            </div>

        </div>

        <div class="modal-footer-area">
            <button class="btn btn-success"
                    onclick="submitSelected()">
                完了
            </button>

            <button class="btn btn-secondary"
                    onclick="closeModal()">
                キャンセル
            </button>
        </div>

    </div>
</div>

<!-- ================= コンテンツ閲覧モーダル ================= -->
<div id="viewModal" class="custom-modal">

    <div class="modal-box large-modal-box">

        <div class="modal-close-area">
            <button onclick="closeViewModal()">×</button>
        </div>

        <h5>リスト内コンテンツ</h5>

        <!-- ★ row をやめて縦並び専用レイアウトに変更 -->
        <div id="viewArea" class="view-list-area"></div>

    </div>
</div>

<!-- ================= JS ================= -->
<script>
let currentListId = null;
const selectedIds = new Set();

function closeViewModal() {
    document.getElementById("viewModal").style.display = "none";
}

function viewItem(btn) {
    const card = btn.closest(".card");
    const contentsId = card.getAttribute("data-contents-id");

    window.location.href = `/contents/view/${contentsId}?listId=${currentListId}`;
}

function openModal(btn) {
    currentListId = btn.getAttribute("data-list-id");

    document.getElementById("hiddenListId").value = currentListId;

    selectedIds.clear();
    document.getElementById("selectedArea").innerHTML = "";

    // ★既存選択取得
    fetch(`/my-lists/selected-contents/${currentListId}`)
        .then(res => res.json())
        .then(data => {

            data.forEach(item => {

                const contentsId = item.contentsId;

                // 元カード取得
                const originalCard = document.querySelector(
                    `#contentListArea [data-contents-id="${contentsId}"]`
                );

                if (!originalCard) return;

                const addBtn = originalCard.querySelector(".add-btn");

                // ★既存ロジック流用
                addItem(addBtn);
            });

        });

    document.getElementById("modal").style.display = "block";
}

function openViewModal(btn) {
    currentListId = btn.getAttribute("data-list-id");

    fetch(`/my-lists/selected-contents/${currentListId}`)
        .then(res => res.json())
        .then(data => {

            const viewArea = document.getElementById("viewArea");
            viewArea.innerHTML = "";

            data.forEach(item => {

                const contentsId = item.contentsId;
                
                const originalCard = document.querySelector(
                    `#contentListArea [data-contents-id="${contentsId}"]`
                );

                if (!originalCard) return;

                // ===== 横並びレイアウトを新規作成 =====
                const wrapper = document.createElement("div");
                wrapper.className = "view-row-card";

                // 左：画像
                const imageArea = document.createElement("div");
                imageArea.className = "view-image-area";

                const img = originalCard.querySelector("img");
                if (img) {
                    const cloneImg = img.cloneNode(true);
                    cloneImg.className = "view-thumbnail";
                    imageArea.appendChild(cloneImg);
                } else {
                    imageArea.innerHTML = "<div class='view-no-image'>画像</div>";
                }

                // 右：情報
                const infoArea = document.createElement("div");
                infoArea.className = "view-info-area";

                // タイトル
                const title = document.createElement("h5");
                title.className = "view-title";
                title.textContent =
                    originalCard.getAttribute("data-title") || "タイトル";

                // タグ
                const tagArea = document.createElement("div");
                tagArea.className = "view-tag-area";

                const tagText = originalCard.getAttribute("data-tag") || "";
                if (tagText) {
                    tagText.split(",").forEach(tag => {
                        const span = document.createElement("span");
                        span.className = "view-tag";
                        span.textContent = tag.trim();
                        tagArea.appendChild(span);
                    });
                } else {
                    const span = document.createElement("span");
                    span.className = "view-tag";
                    span.textContent = "none";
                    tagArea.appendChild(span);
                }

                // 説明
                const desc = document.createElement("p");
                desc.className = "view-description";
                desc.textContent = (originalCard.getAttribute("data-text") || "説明なし");

                // 閲覧ボタン
                const viewBtn = document.createElement("button");
                viewBtn.className = "btn btn-info btn-sm mt-2 show-contents-button";
                viewBtn.textContent = "閲覧";
                viewBtn.onclick = function () {
                    const contentsId =
                        originalCard.getAttribute("data-contents-id");
                    window.location.href =
                        `/contents/view/${contentsId}?listId=${currentListId}`;
                };

                infoArea.appendChild(title);
                infoArea.appendChild(tagArea);
                infoArea.appendChild(desc);
                infoArea.appendChild(viewBtn);

                wrapper.appendChild(imageArea);
                wrapper.appendChild(infoArea);

                viewArea.appendChild(wrapper);
            });

        });

    document.getElementById("viewModal").style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function addItem(btn) {
    const card = btn.closest("[data-contents-id]");
    const contentsId = card.getAttribute("data-contents-id");

    if (selectedIds.has(contentsId)) return;

    selectedIds.add(contentsId);

    btn.textContent = "追加済み";
    btn.disabled = true;

    const newCard = document.createElement("div");
    newCard.className = "short-row-card";
    newCard.id = "selected-" + contentsId;
    newCard.setAttribute("data-contents-id", contentsId);

    // 順番
    const badge = document.createElement("div");
    badge.className = "order-badge";
    badge.textContent = selectedIds.size;
    newCard.appendChild(badge);

    // 画像
    const imageArea = document.createElement("div");
    imageArea.className = "short-image-area";

    const img = card.querySelector("img");
    if (img) {
        const cloneImg = img.cloneNode(true);
        cloneImg.className = "short-thumbnail";
        imageArea.appendChild(cloneImg);
    }

    newCard.appendChild(imageArea);

    // 情報
    const infoArea = document.createElement("div");
    infoArea.className = "short-info-area";

    const title = document.createElement("div");
    title.className = "short-title";
    title.textContent = card.getAttribute("data-title") || "";

    const tagArea = document.createElement("div");
    tagArea.className = "short-tag-area";

    const tagText = card.getAttribute("data-tag") || "";
    if (tagText) {
        tagText.split(",").forEach(tag => {
            const span = document.createElement("span");
            span.className = "short-tag";
            span.textContent = tag.trim();
            tagArea.appendChild(span);
        });
    }

    const desc = document.createElement("p");
    desc.className = "short-description";
    desc.textContent = card.getAttribute("data-text") || "";

    infoArea.appendChild(title);
    infoArea.appendChild(tagArea);
    infoArea.appendChild(desc);

    newCard.appendChild(infoArea);

    // 削除ボタン
    const delBtn = document.createElement("button");
    delBtn.className = "btn btn-danger btn-sm short-action-button";
    delBtn.textContent = "削除";

    delBtn.addEventListener("click", function () {
        removeItem(contentsId);
    });

    newCard.appendChild(delBtn);

    document.getElementById("selectedArea").appendChild(newCard);

    updateCount();
}

function removeItem(contentsId) {
    const wrapper = document.getElementById("selected-" + contentsId);
    if (wrapper) wrapper.remove();

    // 元カードの追加ボタンを戻す
    const originalCard = document.querySelector(
        `#contentListArea [data-contents-id="${contentsId}"]`
    );
    if (originalCard) {
        const originalBtn = originalCard.querySelector(".add-btn");
        originalBtn.textContent = "追加";
        originalBtn.disabled = false;
    }

    selectedIds.delete(contentsId);
    updateCount();
    renumberBadges(); // ★ 番号を振り直す
}

function updateCount() {
    document.getElementById("selectedCount").textContent = selectedIds.size;
}

function submitSelected() {

    const wrappers = document.querySelectorAll("#selectedArea .short-row-card");

    if (wrappers.length === 0) {
        alert("コンテンツが選択されていません。");
        return;
    }

    const listId = document.getElementById("hiddenListId").value;

    // ★ [order, contentsId] の配列
    let dataList = [];

    wrappers.forEach(wrapper => {
        const card = wrapper;
        const contentsId = wrapper.id.replace("selected-", "");
        const order = card.querySelector(".order-badge").textContent;

        dataList.push({
            order: parseInt(order),
            contentsId: contentsId
        });
    });

    // ★ order順にソート（安全対策）
    dataList.sort((a, b) => a.order - b.order);

    // ★ contentsIdだけの配列に変換
    const contentsIds = dataList.map(d => d.contentsId);

    // ★送信
    fetch("/my-lists/add-contents", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            listId: listId,
            contentsIds: contentsIds
        })
    }).then(() => {
        location.reload();
    });
}

// 選択済みカードのバッジ番号を 1,2,3... に振り直す
function renumberBadges() {
    const wrappers = document.querySelectorAll("#selectedArea .col-md-3");
    wrappers.forEach((wrapper, index) => {
        const badge = wrapper.querySelector(".order-badge");
        if (badge) badge.textContent = index + 1;
    });
}

function openCreateListModal() {
    document.getElementById("createListModal").style.display = "block";
}

function closeCreateListModal() {
    document.getElementById("createListModal").style.display = "none";
}
</script>

</body>
</html>
