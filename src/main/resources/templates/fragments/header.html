<!-- templates/fragments/header.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="header(activeMenu)">
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                コンテンツプラットフォーム
            </a>

            <div>
                <a th:class="${activeMenu == 'publicContents'} 
                        ? 'btn btn-primary' 
                        : 'btn btn-outline-secondary'"
                   href="/public-contents">
                    公開コンテンツ
                </a>

                <a th:class="${activeMenu == 'publicLists'} 
                        ? 'btn btn-primary' 
                        : 'btn btn-outline-secondary'"
                   href="/public-lists">
                    公開リスト
                </a>

                <a th:class="${activeMenu == 'myContents'} 
                        ? 'btn btn-primary' 
                        : 'btn btn-outline-secondary'"
                   href="/my-contents">
                    マイコンテンツ
                </a>

                <a th:class="${activeMenu == 'myLists'} 
                        ? 'btn btn-primary' 
                        : 'btn btn-outline-secondary'"
                   href="/my-lists">
                    マイリスト
                </a>

                <a class="btn btn-outline-dark" href="/">
                    ログアウト
                </a>
            </div>
        </div>
    </nav>
</div>

</body>
</html>
