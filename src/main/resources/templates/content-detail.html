<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${content.title}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-4">

    <h2 th:text="${content.title}"></h2>

    <img th:src="${content.thumbnailUrl}" class="img-fluid mb-3">

    <p th:text="${content.description}"></p>

    <a th:href="@{/my-contents}" class="btn btn-secondary mb-3">戻る</a>
</body>
</html>
