<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>コンテンツ詳細</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Markdown変換 -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
    background: #f8f9fa;
}

/* 戻るボタン固定 */
.back-button {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 999;
    width: 64px;
    height: 64px;
    font-size: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* サムネイルを縦半分程度に */
.thumbnail {
    width: 100%;
    aspect-ratio: 16 / 4.5;
    object-fit: cover;
    border-radius: 8px;
}

/* 説明欄 */
.description-box {
    white-space: normal;
    font-family: inherit;
    background: transparent;
    border: none;
    padding: 0;
    border-radius: 0;
    box-shadow: none;
}

/* markdownの見た目補正 */
.description-box h1,
.description-box h2,
.description-box h3 {
    margin-top: 1rem;
    margin-bottom: 1rem;
}

.description-box p {
    margin-bottom: 1rem;
}

.description-box pre {
    background: #f5f5f5;
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
}

.description-box code {
    background: #f1f1f1;
    padding: 2px 6px;
    border-radius: 4px;
}

/* 動画サイズ調整（左寄せ・0.8倍） */
.movie-box {
    width: 80%;
    margin-left: 0;
}

/* ダウンロードボタン（左寄せ・1/4幅） */
.download-box {
    width: 25%;
    min-width: 180px;
    margin-left: 0;
}
</style>
</head>

<body>

<!-- 戻るボタン -->
<button
    class="btn btn-outline-secondary back-button"
    onclick="history.back()">
    ←
</button>

<div class="container py-5">

    <!-- サムネ -->
    <div class="card mb-4">
        <img
            th:src="${content.thumbnailUrl}"
            class="thumbnail"
            alt="thumbnail">
    </div>

    <!-- タイトル -->
    <div class="mb-4">
        <h3 th:text="${content.title}"></h3>
    </div>

    <!-- タグ -->
    <div class="mb-4">
        <span
            class="badge bg-secondary me-1"
            th:each="tag : ${tags}"
            th:text="${tag}">
        </span>
    </div>

    <!-- メタ情報 -->
    <div class="mb-3 text-muted">
        <span th:text="${content.author}"></span>
        /
        <span th:text="${content.createdAt}"></span>
    </div>

    <hr>
    
    <!-- 説明 -->
    <div class="mb-4">
        <!-- Markdown描画用 -->
        <div
            id="description-preview"
            class="description-box">
        </div>

        <!-- 元データを保持（非表示） -->
        <textarea
            id="description-source"
            th:text="${content.description}"
            style="display:none;">
        </textarea>
    </div>

    <!-- 動画（存在する時だけ表示） -->
    <div
        th:if="${content.movieUrl != null and !#strings.isEmpty(#strings.trim(content.movieUrl))}"
        class="card mb-4 movie-box">

        <video controls class="w-100">
            <source
                th:src="@{${content.movieUrl}}"
                type="video/mp4">
            動画を再生できません
        </video>
    </div>

    <!-- ダウンロード（存在する時だけ表示） -->
    <div
        th:if="${content.fileUrl != null and !#strings.isEmpty(#strings.trim(content.fileUrl))}"
        class="download-box mb-4">

        <a
            th:href="@{'/download' + ${content.fileUrl}}"
            class="btn btn-primary w-100">
            ダウンロード
        </a>
    </div>

    <!-- リスト内コンテンツ -->
    <div
        th:if="${listContents != null and listContents.size() > 0}">
        <hr>
        <h5>リスト内コンテンツ</h5>

        <div class="d-flex flex-wrap gap-2">

            <a
                th:each="item : ${listContents}"
                th:href="@{/contents/view/{id}(id=${item.contentsId}, listId=${listId})}"
                th:class="${item.contentsId == currentId}
                    ? 'btn btn-primary'
                    : 'btn btn-outline-primary'">

                <span th:text="${item.contentsTitle}"></span>

            </a>

        </div>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const markdownText =
        document.getElementById("markdownSource").value || "";

    document.getElementById("markdownPreview").innerHTML =
        marked.parse(markdownText);
});
</script>
<!-- bodyの最後（</body>の直前）に追加 -->
<script>
document.addEventListener("DOMContentLoaded", function () {
    const source = document.getElementById("description-source").value;
    const preview = document.getElementById("description-preview");

    preview.innerHTML = marked.parse(source || "");
});
</script>
</body>
</html>
