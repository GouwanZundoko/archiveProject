<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>マイリスト</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        /* =========================
           Modal Common
        ========================= */
        .custom-modal {
            display: none;
            z-index: 9999;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-box {
            background: #fff;
        }

        .modal-close-area {
            text-align: right;
        }

        .modal-center {
            text-align: center;
        }

        /* =========================
           Create List Modal
        ========================= */
        .create-list-modal-box {
            width: 400px;
            margin: 10% auto;
            padding: 20px;
        }

        /* =========================
           Content Add / View Modal
        ========================= */
        .large-modal-box {
            width: 1300px;
            height: 90%;
            margin: 3% auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-list-section {
            flex: 1;
            overflow-y: auto;
            border-bottom: 2px solid #ccc;
            padding-bottom: 10px;
            width: 1285px;
        }

        .selected-content-section {
            height: 220px;
            overflow-y: auto;
            padding-top: 10px;
        }

        .modal-footer-area {
            text-align: center;
            margin-top: 10px;
            flex-shrink: 0;
        }

        .view-area {
            overflow-y: auto;
        }
        
        .contents-add-list {
            height: 300px;
            width: 416px;
            padding: 0px;
            margin: 5px;
        }

        /* =========================
           Card Overlay
        ========================= */
        .card-title-overlay {
            position: absolute;
            top: 5px;
            left: 5px;
            font-weight: bold;
            z-index: 1;
            background-color: white;
            padding-left: 2px;
            padding-right: 2px;
        }

        .card-image-fixed {
            height: 120px;
            object-fit: cover;
        }

        .add-btn-position,
        .delete-btn-position {
            position: absolute;
            bottom: 5px;
            right: 5px;
        }

        .position-relative {
            height: 300px;
            width: 416px;
            padding: 0px;
            margin: 5px;
        }

        /* =========================
           Selected Order Badge
        ========================= */
        .order-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            width: 24px;
            height: 24px;
            background: #0d6efd;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            z-index: 2;
        }

        .selected-card-title {
            position: absolute;
            top: 5px;
            left: 5px;
            font-weight: bold;
            z-index: 1;
        }
    </style>
</head>

<body>

<!-- ヘッダー -->
<div th:replace="fragments/header :: header('publicLists')"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>公開物一覧</h2>
    </div>

    <!-- 検索エリア -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">

                <div class="col-md-4">
                    <label class="form-label">タイトル</label>
                    <input type="text"
                           id="searchTitle"
                           class="form-control"
                           placeholder="タイトル検索">
                </div>

                <div class="col-md-4">
                    <label class="form-label">タグ</label>
                    <input type="text"
                           id="searchTag"
                           class="form-control"
                           placeholder="タグ検索">
                </div>

                <div class="col-md-3">
                    <label class="form-label">表示物</label>
                    <select id="searchType" class="form-select">
                        <option value="">未入力</option>
                        <option value="content">コンテンツ</option>
                        <option value="list">リスト</option>
                    </select>
                </div>

                <div class="col-md-1 d-flex align-items-end">
                    <button class="btn btn-primary w-100"
                            onclick="searchItems()">
                        検索
                    </button>
                </div>

            </div>
        </div>
    </div>
    <div class="row">
        <!-- lists側 th:each を修正 -->
        <div class="col-md-4 mb-3 list-card"
            th:each="list : ${lists}"
            th:attr="data-title=${list.listsTitle}">
            <div class="card">
                <div class="card-body">
                    <h5 th:text="${list.listsTitle}"></h5>
                    <p th:text="${list.listsText != null ? list.listsText : '内容なし'}"></p>
                    
                    <!-- タグ -->
                    <div class="mb-4">
                        <span
                            class="badge bg-secondary me-1"
                            th:each="tag : ${list.listsTagArray}"
                            th:text="${tag}">
                        </span>
                    </div>

                    <div th:if="${list.showAuth == '1'}">
                        <button class="btn btn-success w-100 mt-2"
                                th:attr="data-list-id=${list.listsId}"
                                onclick="openModal(this)">
                            コンテンツ追加
                        </button>
                    </div>

                    <button class="btn btn-info w-100 mt-2"
                            th:attr="data-list-id=${list.listsId}"
                            onclick="openViewModal(this)">
                        コンテンツ閲覧
                    </button>

                    <!-- コンテンツ公開 -->
                    <a th:if="${list.showAuth == '1' && list.showPublicAuth == '0'}"
                        th:href="@{'/public-lists/release/' + ${list.listsId} + '/1'}"
                        class="btn btn-primary btn-sm">
                        コンテンツ公開
                    </a>
                    
                    <!-- コンテンツ非公開 -->
                    <a th:if="${list.showAuth == '1' && list.showPublicAuth == '1'}"
                        th:href="@{'/public-lists/release/' + ${list.listsId} + '/0'}"
                        class="btn btn-primary btn-sm">
                        コンテンツ非公開
                    </a>

                    <!-- コンテンツインポート -->
                    <a th:if="${list.showAuth == null || list.showAuth == '' || list.showAuth == 'null'}"
                        th:href="@{'/public-lists/import/' + ${list.listsId}}"
                        class="btn btn-primary btn-sm">
                        コンテンツインポート
                    </a>
                    
                    <!-- 削除 -->
                    <div th:if="${list.showAuth == '1'}">
                        <a th:href="@{'/public-lists/delete/' + ${list.listsId}}" class="btn btn-warning btn-sm">
                            削除
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <!-- contents側 th:each を修正 -->
        <div class="col-md-4 mb-4 content-card"
            th:each="item : ${contents}"
            th:attr="data-title=${item.contentsTitle},
                    data-tag=${item.tag}">
            <div class="card shadow-sm">

                <!-- 画像（ある場合） -->
                <img th:if="${item.imageUrl != null}"
                     th:src="@{${item.imageUrl}}"
                     class="card-img-top"/>

                <!-- 画像（ない場合） -->
                <img th:if="${item.imageUrl == null}"
                     src="/img/no-image.png"
                     class="card-img-top"/>

                <div class="card-body">

                    <!-- タイトル -->
                    <h5 class="card-title"
                        th:text="${item.contentsTitle}"></h5>

                    <!-- 説明 -->
                    <p class="card-text text-muted"
                       th:text="${#strings.abbreviate(item.contentsText, 80)}">
                    </p>

                    <!-- 作成者 -->
                    <div class="mb-2 text-muted small">
                        作成者: <span th:text="${item.userId}"></span>
                    </div>
                    
                    <!-- タグ -->
                    <div class="mb-4">
                        <span
                            class="badge bg-secondary me-1"
                            th:each="tag : ${item.contentsTagArray}"
                            th:text="${tag}">
                        </span>
                    </div>

                    <!-- ボタン -->
                    <div class="d-flex gap-2">

                        <!-- 閲覧 -->
                        <a th:href="@{'/contents/view/' + ${item.contentsId}}"
                           class="btn btn-primary btn-sm">
                            閲覧
                        </a>

                        <!-- 編集 -->
                        <a th:if="${item.showAuth == '1'}"
                           th:href="@{'/contents/edit/' + ${item.contentsId}}"
                           class="btn btn-warning btn-sm">
                            編集
                        </a>
                        
                        <!-- コンテンツ非公開 -->
                        <a th:if="${item.showAuth == '1' && item.showPublicAuth == '1'}"
                           th:href="@{'/contents/release/' + ${item.contentsId} + '/0'}"
                           class="btn btn-primary btn-sm">
                            コンテンツ非公開
                        </a>

                        <!-- コンテンツインポート -->
                        <a th:if="${item.showAuth == null || item.showAuth == '' || item.showAuth == 'null'}"
                           th:href="@{'/contents/import/' + ${item.contentsId}}"
                           class="btn btn-primary btn-sm">
                            コンテンツインポート
                        </a>
                    </div>

                    <!-- hidden -->
                    <input type="hidden" th:value="${item.tag}" />
                    <input type="hidden" th:value="${item.movieUrl}" />
                    <input type="hidden" th:value="${item.fileUrl}" />
                    <input type="hidden" th:value="${item.companyId}" />
                    <input type="hidden" th:value="${item.showAuth}" />

                </div>

            </div>
        </div>
    </div>
</div>

<!-- ================= リスト作成モーダル ================= -->
<div id="createListModal" class="custom-modal">

    <div class="modal-box create-list-modal-box">

        <div class="modal-close-area">
            <button onclick="closeCreateListModal()">×</button>
        </div>

        <h4>リスト作成</h4>

        <form action="/public-lists/create-list" method="post">
            <input type="hidden" id="hiddenListId" name="hiddenListId">

            <div class="mb-3">
                <label class="form-label">タイトル</label>
                <input type="text" name="listsTitle" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">説明</label>
                <textarea name="listsText" class="form-control"></textarea>
            </div>

            <div class="modal-center">
                <button type="submit" class="btn btn-success">作成</button>
                <button type="button" class="btn btn-secondary"
                        onclick="closeCreateListModal()">キャンセル</button>
            </div>

        </form>

    </div>
</div>

<!-- ================= コンテンツ追加モーダル ================= -->
<div id="modal" class="custom-modal">

    <div class="modal-box large-modal-box">

        <div class="modal-close-area">
            <button onclick="closeModal()">×</button>
        </div>
        <h5 class="mb-3">コンテンツ一覧</h5>

        <div class="content-list-section">
            <div class="row" id="contentListArea">

                <div class="col-md-3 mb-3 contents-add-list" th:each="item : ${contentsList}">
                    <div class="card position-relative"
                         th:attr="data-contents-id=${item.contentsId},
                                  data-tag=${item.tag},
                                  data-user-id=${item.userId},
                                  data-title=${item.contentsTitle},
                                  data-text=${item.contentsText},
                                  data-image=${item.imageUrl}">

                        <div class="card-title-overlay"
                             th:text="${item.contentsTitle}"></div>

                        <img class="card-img-top card-image-fixed"
                             th:src="@{${item.imageUrl}}"/>

                        <div class="mb-4">
                            <span class="badge bg-secondary me-1"
                                  th:each="tag : ${item.contentsTagArray}"
                                  th:text="${tag}">
                            </span>
                        </div>

                        <div class="card-body pb-5">
                            <p th:text="${item.contentsText}"></p>
                        </div>

                        <button class="btn btn-primary btn-sm add-btn add-btn-position"
                                onclick="addItem(this)">
                            追加
                        </button>

                    </div>
                </div>

            </div>
        </div>
        <h5 class="mb-2">
            選択済みコンテンツ
            <span id="selectedCount" class="badge bg-secondary">0</span>
        </h5>
        <div class="selected-content-section">
            <div class="row" id="selectedArea"></div>
        </div>

        <div class="modal-footer-area">
            <button class="btn btn-success" onclick="submitSelected()">完了</button>
            <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
        </div>

    </div>
</div>

<!-- ================= コンテンツ閲覧モーダル ================= -->
<div id="viewModal" class="custom-modal">

    <div class="modal-box large-modal-box">

        <div class="modal-close-area">
            <button onclick="closeViewModal()">×</button>
        </div>

        <h5>リスト内コンテンツ</h5>

        <div id="viewArea" class="row view-area"></div>

    </div>
</div>
<script>
let currentListId = null;
const selectedIds = new Set();

function openViewModal(btn) {
    currentListId = btn.getAttribute("data-list-id");

    fetch(`/public-lists/selected-contents/${currentListId}`)
        .then(res => res.json())
        .then(data => {
            const viewArea = document.getElementById("viewArea");
            viewArea.innerHTML = "";

            data.forEach(item => {
                const originalCard = document.querySelector(
                    `#contentListArea .card[data-contents-id="${item.contentsId}"]`
                );

                if (!originalCard) return;

                const clone = originalCard.cloneNode(true);

                let btn = clone.querySelector(".add-btn");
                if (btn) {
                    btn.textContent = "閲覧";
                    btn.onclick = function () {
                        viewItem(btn);
                    };
                }

                viewArea.appendChild(clone);
            });
        });

    document.getElementById("viewModal").style.display = "block";
}

function closeViewModal() {
    document.getElementById("viewModal").style.display = "none";
}

function viewItem(btn) {
    const card = btn.closest(".card");
    const contentsId = card.getAttribute("data-contents-id");

    window.location.href = `/contents/view/${contentsId}?listId=${currentListId}`;
}

function openModal(btn) {
    currentListId = btn.getAttribute("data-list-id");

    document.getElementById("hiddenListId").value = currentListId;

    selectedIds.clear();
    document.getElementById("selectedArea").innerHTML = "";

    fetch(`/public-lists/selected-contents/${currentListId}`)
        .then(res => res.json())
        .then(data => {
            data.forEach(item => {
                const contentsId = item.contentsId;

                const originalCard = document.querySelector(
                    `#contentListArea .card[data-contents-id="${contentsId}"]`
                );

                if (!originalCard) return;

                const addBtn = originalCard.querySelector(".add-btn");

                addItem(addBtn);
            });
        });

    document.getElementById("modal").style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function addItem(btn) {
    const card = btn.closest(".card");
    const contentsId = card.getAttribute("data-contents-id");

    if (selectedIds.has(contentsId)) return;
    selectedIds.add(contentsId);

    btn.textContent = "追加済み";
    btn.disabled = true;

    const newCard = document.createElement("div");
    newCard.className = "card position-relative";

    const badge = document.createElement("div");
    badge.className = "order-badge";
    badge.textContent = selectedIds.size;
    newCard.appendChild(badge);

    const titleDiv = document.createElement("div");
    titleDiv.className = "selected-card-title";
    titleDiv.textContent = card.getAttribute("data-title") || "";
    newCard.appendChild(titleDiv);

    const img = card.querySelector("img");
    if (img) {
        const cloneImg = img.cloneNode(true);
        newCard.appendChild(cloneImg);
    }

    const bodyDiv = document.createElement("div");
    bodyDiv.className = "card-body pb-5";

    const p = document.createElement("p");
    p.textContent = card.getAttribute("data-text") || "";

    bodyDiv.appendChild(p);
    newCard.appendChild(bodyDiv);

    const delBtn = document.createElement("button");
    delBtn.className = "btn btn-danger btn-sm delete-btn-position";
    delBtn.textContent = "削除";
    delBtn.dataset.contentsId = contentsId;

    delBtn.addEventListener("click", function () {
        removeItem(contentsId);
    });

    newCard.appendChild(delBtn);

    const wrapper = document.createElement("div");
    wrapper.className = "col-md-3 mb-3 contents-add-list";
    wrapper.id = "selected-" + contentsId;
    wrapper.appendChild(newCard);

    document.getElementById("selectedArea").appendChild(wrapper);

    updateCount();
}

function removeItem(contentsId) {
    const wrapper = document.getElementById("selected-" + contentsId);
    if (wrapper) wrapper.remove();

    const originalCard = document.querySelector(
        `#contentListArea .card[data-contents-id="${contentsId}"]`
    );

    if (originalCard) {
        const originalBtn = originalCard.querySelector(".add-btn");
        originalBtn.textContent = "追加";
        originalBtn.disabled = false;
    }

    selectedIds.delete(contentsId);

    updateCount();
    renumberBadges();
}

function updateCount() {
    document.getElementById("selectedCount").textContent = selectedIds.size;
}

function submitSelected() {
    const wrappers = document.querySelectorAll("#selectedArea .col-md-3");

    if (wrappers.length === 0) {
        alert("コンテンツが選択されていません。");
        return;
    }

    const listId = document.getElementById("hiddenListId").value;

    let dataList = [];

    wrappers.forEach(wrapper => {
        const card = wrapper.querySelector(".card");
        const contentsId = wrapper.id.replace("selected-", "");
        const order = card.querySelector(".order-badge").textContent;

        dataList.push({
            order: parseInt(order),
            contentsId: contentsId
        });
    });

    dataList.sort((a, b) => a.order - b.order);

    const contentsIds = dataList.map(d => d.contentsId);

    fetch("/public-lists/add-contents", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            listId: listId,
            contentsIds: contentsIds
        })
    }).then(() => {
        location.reload();
    });
}

function renumberBadges() {
    const wrappers = document.querySelectorAll("#selectedArea .col-md-3");

    wrappers.forEach((wrapper, index) => {
        const badge = wrapper.querySelector(".order-badge");
        if (badge) {
            badge.textContent = index + 1;
        }
    });
}

function openCreateListModal() {
    document.getElementById("createListModal").style.display = "block";
}

function closeCreateListModal() {
    document.getElementById("createListModal").style.display = "none";
}

function searchItems() {
    const title = document.getElementById("searchTitle").value
        .trim()
        .toLowerCase();

    const tag = document.getElementById("searchTag").value
        .trim()
        .toLowerCase();

    const type = document.getElementById("searchType").value;

    const listCards = document.querySelectorAll(".list-card");
    const contentCards = document.querySelectorAll(".content-card");

    listCards.forEach(card => {
        card.style.display = "";
    });

    contentCards.forEach(card => {
        card.style.display = "";
    });

    if (type === "content") {
        listCards.forEach(card => {
            card.style.display = "none";
        });
    }

    if (type === "list") {
        contentCards.forEach(card => {
            card.style.display = "none";
        });
    }

    if (title !== "") {
        listCards.forEach(card => {
            if (card.style.display === "none") return;

            const cardTitle = (card.dataset.title || "").toLowerCase();

            if (!cardTitle.includes(title)) {
                card.style.display = "none";
            }
        });

        contentCards.forEach(card => {
            if (card.style.display === "none") return;

            const cardTitle = (card.dataset.title || "").toLowerCase();

            if (!cardTitle.includes(title)) {
                card.style.display = "none";
            }
        });
    }

    if (tag !== "") {
        contentCards.forEach(card => {
            if (card.style.display === "none") return;

            const cardTag = (card.dataset.tag || "").toLowerCase();

            if (!cardTag.includes(tag)) {
                card.style.display = "none";
            }
        });
    }
}
</script>

</body>
</html>
