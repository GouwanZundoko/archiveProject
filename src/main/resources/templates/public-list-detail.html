<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title th:text="${list.title}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 th:text="${list.title}"></h2>
    <p class="text-muted" th:text="${list.description}"></p>

    <hr>

    <div class="row">
        <div class="col-md-4 mb-4"
             th:each="content : ${list.contents}">
            <div class="card">

                <img th:src="${content.thumbnailUrl}"
                     class="card-img-top"
                     style="height:200px;object-fit:cover;">

                <div class="card-body">
                    <h5 th:text="${content.title}"></h5>
                    <p class="text-muted small"
                       th:text="${#strings.abbreviate(content.description, 80)}"></p>
                </div>

            </div>
        </div>
    </div>

    <a href="/public-lists" class="btn btn-secondary mt-3">
        戻る
    </a>

</div>
</body>
</html>
